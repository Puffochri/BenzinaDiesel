stages:
  - build
  - deploy

build:
  stage: build
  image: node:18
  script:
    - npm ci
    - npm run build || echo "no build step"

deploy_worker:
  stage: deploy
  image: node:18
  variables:
    CF_API_TOKEN: $CF_API_TOKEN
  script:
    - npm i -g wrangler
    - wrangler publish
  only:
    - main
