<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prezzi Carburanti — PRO VELOCE</title>

  <!-- Performance and security -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <meta name="theme-color" content="#0b76ff">

  <!-- Styles -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet CSS (defer loading of JS) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="" crossorigin="anonymous" />

  <!-- Defer heavy libs to improve initial paint -->
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar" role="banner" aria-label="Intestazione applicazione">
    <div class="brand" aria-hidden="false">
      <img src="icons/icon-48.png" alt="Logo Prezzi Carburanti" class="logo" width="44" height="44">
      <div class="brand-text">
        <h1 class="app-title">Prezzi Carburanti</h1>
        <p class="tagline">Veloce • Preciso • Professionale</p>
      </div>
    </div>

    <nav class="top-actions" role="navigation" aria-label="Azioni principali">
      <button id="btn-refresh" class="icon-btn" title="Aggiorna dati" aria-label="Aggiorna dati">⟳</button>
      <button id="themeToggle" aria-pressed="false" class="icon-btn" title="Cambia tema" aria-label="Cambia tema">🌓</button>
      <button id="openFilters" aria-expanded="false" aria-controls="panelFilters" class="icon-btn" title="Mostra filtri" aria-label="Mostra filtri">⚙️</button>
    </nav>
  </header>

  <main class="layout" role="main" aria-labelledby="appTitle">
    <aside id="panelFilters" class="panel hidden" aria-hidden="true" role="region" aria-label="Pannello filtri">
      <div class="panel-inner">
        <div id="locationBadge" class="location-badge" aria-live="polite" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/></svg>
          <span id="locationLabel" class="location-label"></span>
          <button id="clearLocationBtn" class="btn-clear" aria-label="Rimuovi località">✕</button>
        </div>

        <div class="search-row" role="search" aria-label="Cerca città">
          <label for="cityInput" class="visually-hidden">Cerca città</label>
          <div class="search-wrapper">
            <input id="cityInput" type="search" placeholder="Cerca città, es. Parma" aria-label="Cerca città" autocomplete="off" />
            <div id="suggestions" class="suggestions" aria-hidden="true"></div>
          </div>
          <button id="searchCityBtn" aria-label="Cerca" class="primary">🔎</button>
        </div>

        <div class="row controls-row">
          <button id="nearMeBtn" class="btn-ghost" aria-label="Trova vicino a me">📍 Vicino a me</button>

          <div class="radius-control" aria-label="Raggio ricerca">
            <label for="radius" class="label-inline">Raggio</label>
            <input id="radius" type="range" min="1" max="50" value="10" aria-labelledby="radiusNumber" />
            <input id="radiusNumber" type="number" min="1" max="50" value="10" aria-label="Raggio in chilometri" />
            <span id="radiusValue" class="muted">10 km</span>
          </div>
        </div>

        <div class="filters" role="region" aria-label="Filtri carburante">
          <label class="label-block">Carburante</label>
          <div class="chips" role="list">
            <button class="chip active" data-fuel="" role="listitem">Tutti</button>
            <button class="chip" data-fuel="Benzina" role="listitem">Benzina</button>
            <button class="chip" data-fuel="Gasolio" role="listitem">Gasolio</button>
            <button class="chip" data-fuel="GPL" role="listitem">GPL</button>
            <button class="chip" data-fuel="Metano" role="listitem">Metano</button>
            <button class="chip" data-fuel="Blue Diesel" role="listitem">Blue Diesel</button>
          </div>

          <label class="label-block" for="sortPrice">Ordina</label>
          <select id="sortPrice" aria-label="Ordina risultati">
            <option value="distance">Distanza</option>
            <option value="price-asc">Prezzo ↑</option>
            <option value="price-desc">Prezzo ↓</option>
            <option value="updated">Più recenti</option>
          </select>
        </div>

        <div id="abuseNotice" class="abuse-notice" aria-hidden="true"></div>
        <div class="small-note">Dati MIMIT • Cache locale • Nessuna autenticazione</div>
      </div>
    </aside>

    <section class="map-column" aria-label="Mappa e risultati">
      <div id="map" class="map" role="application" aria-label="Mappa distributori" tabindex="0"></div>

      <div class="toolbar" role="region" aria-label="Barra strumenti">
        <label for="quickFilter" class="visually-hidden">Filtra risultati</label>
        <input id="quickFilter" placeholder="Cerca nome o indirizzo" aria-label="Filtra risultati" />
        <div class="pagination" id="pagination" aria-label="Paginazione risultati"></div>
      </div>

      <section id="results" class="results" aria-live="polite" role="list">
        <!-- Skeleton o card inserite dinamicamente -->
      </section>

      <div id="infiniteAnchor" style="height:1px" aria-hidden="true"></div>
    </section>
  </main>

  <div id="panelOverlay" class="overlay" hidden aria-hidden="true"></div>

  <footer class="footer" role="contentinfo">
    <small>© 2026 — App non ufficiale • Dati MIMIT</small>
  </footer>

  <!-- Templates -->
  <template id="station-card-template">
    <article class="card" role="listitem" aria-label="Stazione">
      <div class="price-badge" aria-hidden="true">—</div>
      <div class="meta">
        <div class="title">Nome stazione</div>
        <div class="subtitle">Indirizzo • Comune</div>
        <div class="meta-row">
          <div class="chip distance">— km</div>
          <div class="chip updated">Agg: —</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-ghost btn-directions" aria-label="Indicazioni">Indicazioni</button>
      </div>
    </article>
  </template>

  <script defer src="script.js"></script>
</body>
</html>
