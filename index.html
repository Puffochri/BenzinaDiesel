<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prezzi Carburanti</title>

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>

<header>
  <h1>Prezzi Carburanti</h1>
  <button id="themeToggle">🌙</button>
</header>

<section id="controls">
  <input id="cityInput" type="text" placeholder="Cerca città (es. Parma)">
  <button id="searchCityBtn">Cerca</button>
  <button id="nearMeBtn">Vicino a me</button>

  <select id="fuelFilter">
    <option value="">Tutti i carburanti</option>
    <option value="Benzina">Benzina</option>
    <option value="Gasolio">Gasolio</option>
    <option value="GPL">GPL</option>
    <option value="Metano">Metano</option>
    <option value="Blue Diesel">Blue Diesel</option>
    <option value="HVO">HVO</option>
  </select>

  <select id="sortPrice">
    <option value="">Ordina</option>
    <option value="asc">Prezzo crescente</option>
    <option value="desc">Prezzo decrescente</option>
  </select>
</section>

<div id="map"></div>

<section id="results"></section>

<script src="script.js"></script>

</body>
</html>
