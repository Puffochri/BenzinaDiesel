<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prezzi Carburanti — PRO</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet + MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</head>
<body>

  <header class="topbar" role="banner">
    <div class="brand">
      <img src="icons/icon-48.png" alt="" class="logo" width="44" height="44">
      <div>
        <h1>Prezzi Carburanti</h1>
        <p class="tag">Trova il distributore migliore vicino a te — veloce e preciso</p>
      </div>
    </div>

    <div class="top-actions" role="navigation" aria-label="Azioni principali">
      <button id="themeToggle" aria-pressed="false" title="Cambia tema" class="icon-btn">🌓</button>
      <button id="openFilters" aria-expanded="false" aria-controls="panelFilters" title="Mostra filtri" class="icon-btn">⚙️</button>
    </div>
  </header>

  <main class="layout" role="main">
    <aside id="panelFilters" class="panel" aria-hidden="false">
      <div id="locationBadge" class="location-badge" style="display:none" aria-live="polite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/></svg>
        <span id="locationLabel" class="location-label"></span>
        <button id="clearLocationBtn" class="btn-clear" aria-label="Rimuovi località">✕</button>
      </div>

      <div class="search-row">
        <div class="search-wrapper">
          <input id="cityInput" type="search" placeholder="Cerca città, es. Parma" aria-label="Cerca città" autocomplete="off" />
          <div id="suggestions" class="suggestions" aria-hidden="true"></div>
        </div>
        <button id="searchCityBtn" aria-label="Cerca" class="primary">🔎</button>
      </div>

      <div class="row">
        <button id="nearMeBtn" class="btn-ghost" aria-label="Trova vicino a me">📍 Vicino a me</button>
        <div class="radius-control">
          <label for="radius">Raggio</label>
          <input id="radius" type="range" min="1" max="50" value="10" />
          <span id="radiusValue">10 km</span>
        </div>
      </div>

      <div class="filters">
        <label>Carburante</label>
        <div class="chips" role="list">
          <button class="chip active" data-fuel="">Tutti</button>
          <button class="chip" data-fuel="Benzina">Benzina</button>
          <button class="chip" data-fuel="Gasolio">Gasolio</button>
          <button class="chip" data-fuel="GPL">GPL</button>
          <button class="chip" data-fuel="Metano">Metano</button>
          <button class="chip" data-fuel="Blue Diesel">Blue Diesel</button>
        </div>

        <label>Ordina</label>
        <select id="sortPrice" aria-label="Ordina risultati">
          <option value="distance">Distanza (predef.)</option>
          <option value="price-asc">Prezzo ↑</option>
          <option value="price-desc">Prezzo ↓</option>
          <option value="updated">Più recenti</option>
        </select>
      </div>

      <div class="small-note">Dati ufficiali MIMIT • Cache locale 24h • Aggiornamenti giornalieri</div>
    </aside>

    <section class="map-column">
      <div id="map" class="map" role="application" aria-label="Mappa distributori"></div>

      <div class="toolbar">
        <input id="quickFilter" placeholder="Cerca nome o indirizzo" aria-label="Filtra risultati" />
        <div class="pagination" id="pagination" aria-label="Paginazione risultati"></div>
      </div>

      <section id="results" class="results" aria-live="polite"></section>
    </section>
  </main>

  <footer class="footer">
    <small>© 2026 — App non ufficiale • Christian Ritucci • Dati MIMIT</small>
  </footer>

  <script defer src="script.js"></script>
</body>
</html>
