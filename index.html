<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prezzi Carburante Vicino a Te</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d6efd" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Prezzi carburante</h1>
    <p>Trova benzina e diesel più economici vicino a te.</p>
  </header>

  <main>
    <section class="controls">
      <div class="control-group">
        <label for="citySelect"><strong>Seleziona città</strong></label>
        <input id="citySelect" type="text" placeholder="Es. Parma, Reggio Emilia, Roma..." />
        <button id="searchByCityBtn">Cerca per città</button>
      </div>

      <div class="divider">oppure</div>

      <div class="control-group">
        <button id="useLocationBtn">Usa la mia posizione</button>
        <p class="hint">Richiederà il permesso di geolocalizzazione.</p>
      </div>

      <div class="control-group">
        <label for="fuelType"><strong>Tipo di carburante</strong></label>
        <select id="fuelType">
          <option value="all">Tutti</option>
          <option value="benzina">Benzina</option>
          <option value="diesel">Diesel</option>
        </select>
      </div>

      <div class="control-group">
        <label for="sortBy"><strong>Ordina per</strong></label>
        <select id="sortBy">
          <option value="distance">Distanza</option>
          <option value="price">Prezzo</option>
        </select>
      </div>
    </section>

    <section id="status" class="status">Pronto per la ricerca.</section>
    <section id="results" class="results"></section>
  </main>

  <footer>
    <small>PWA carburanti – dati da carburanti.madbob.org</small>
  </footer>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
